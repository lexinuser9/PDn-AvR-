<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PDn AvR</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;800&family=Sora:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --lilac:#E7C6FF;
    --periwinkle:#BBD0FF;
    --ink:#0b0a14;
    --panel:#131226;
    --panel2:#181733;
    --line:rgba(231,198,255,0.18);
    --text:#f1edff;
    --muted:#9c96c4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(circle at 15% -10%, rgba(231,198,255,0.16), transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(187,208,255,0.14), transparent 40%),
      var(--ink);
    min-height:100vh;
    font-family:'Sora',sans-serif;
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:28px 16px 60px;
  }
  .app{ width:100%; max-width:460px; }
  [hidden]{ display:none !important; }

  header{ display:flex; align-items:center; gap:14px; margin-bottom:22px; }
  .logo{ width:56px;height:56px;flex:none; filter:drop-shadow(0 0 10px rgba(231,198,255,0.55)); }
  .brand h1{
    font-family:'Orbitron',sans-serif; font-size:22px; font-weight:800; letter-spacing:1.5px; margin:0;
    background:linear-gradient(100deg,var(--lilac),var(--periwinkle));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .brand p{ margin:2px 0 0; font-size:11px; letter-spacing:2.5px; text-transform:uppercase; color:var(--muted); }

  .nav-toggle{
    display:flex; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:4px; margin-bottom:22px; gap:4px;
  }
  .nav-toggle button{
    flex:1; text-align:center; border:none; background:transparent; cursor:pointer;
    font-family:'Sora',sans-serif; font-size:12px; font-weight:600; letter-spacing:0.5px;
    padding:10px 0; border-radius:9px; color:var(--muted); transition:background .15s ease, color .15s ease;
  }
  .nav-toggle button.active{
    background:linear-gradient(100deg,var(--lilac),var(--periwinkle)); color:#1a1330;
  }

  .pagenav{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel); border:1px solid var(--line); border-radius:14px;
    padding:10px 12px; margin-bottom:18px;
  }
  .pagenav button{
    width:34px;height:34px; border-radius:9px; border:1px solid var(--line);
    background:var(--panel2); color:var(--lilac); font-size:16px; cursor:pointer;
    transition:transform .15s ease;
  }
  .pagenav button:active{ transform:scale(0.9); }
  .pagenav button:disabled{ opacity:.3; cursor:default; }
  .pagenav .label{ font-family:'Space Mono',monospace; font-size:13px; text-align:center; }
  .pagenav .label .count{ display:block; font-size:10px; color:var(--muted); letter-spacing:1px; margin-top:2px; }

  .card{
    background:linear-gradient(180deg,var(--panel),var(--panel2)); border:1px solid var(--line);
    border-radius:18px; padding:20px; margin-bottom:18px; box-shadow:0 20px 40px -20px rgba(0,0,0,0.6);
  }
  .field{ margin-bottom:16px; }
  .field:last-child{ margin-bottom:0; }
  .field label{
    display:block; font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--periwinkle); margin-bottom:8px;
  }
  .time-row{ display:flex; align-items:center; gap:6px; }
  .time-row input{
    flex:1; min-width:0; text-align:center; font-family:'Space Mono',monospace; font-size:20px;
    background:var(--ink); border:1px solid var(--line); border-radius:10px; color:var(--text);
    padding:12px 0; outline:none; transition:border-color .15s ease, box-shadow .15s ease;
  }
  .time-row input:focus{ border-color:var(--lilac); box-shadow:0 0 0 3px rgba(231,198,255,0.15); }
  .time-row .colon{ color:var(--muted); font-family:'Space Mono',monospace; font-size:18px; }
  .crash-row input{
    width:100%; font-family:'Space Mono',monospace; font-size:20px; background:var(--ink);
    border:1px solid var(--line); border-radius:10px; color:var(--text); padding:12px 14px;
    outline:none; transition:border-color .15s ease, box-shadow .15s ease;
  }
  .crash-row input:focus{ border-color:var(--periwinkle); box-shadow:0 0 0 3px rgba(187,208,255,0.15); }

  .question{
    text-align:center; font-family:'Orbitron',sans-serif; font-size:18px; font-weight:700;
    letter-spacing:0.5px; color:var(--text); margin:6px 0 18px; padding:16px 10px;
    border:1px solid var(--line); border-radius:14px; background:var(--ink);
  }
  .question span{
    background:linear-gradient(100deg,var(--lilac),var(--periwinkle));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  .actions{ display:flex; gap:10px; margin-top:20px; }
  .btn{
    flex:1; border:none; border-radius:12px; padding:14px 0; font-family:'Sora',sans-serif;
    font-weight:700; font-size:14px; letter-spacing:0.5px; cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .btn:active{ transform:scale(0.97); }
  .btn:disabled{ opacity:.35; cursor:default; }
  .btn-next, .btn-yes{ background:linear-gradient(100deg,var(--lilac),var(--periwinkle)); color:#1a1330; }
  .btn-reset, .btn-no{ background:transparent; color:var(--muted); border:1px solid var(--line); }
  .btn-no{ color:var(--text); }
  .reset-row{ margin-top:14px; }
  .reset-row .btn{ width:100%; }

  .results-head{ display:flex; align-items:baseline; justify-content:space-between; margin:8px 4px 10px; }
  .results-head h2{
    font-family:'Orbitron',sans-serif; font-size:13px; letter-spacing:3px; text-transform:uppercase;
    color:var(--lilac); margin:0;
  }
  .results-head span{ font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); }
  .swipe-zone{ overflow:hidden; border-radius:16px; }
  .results-list{ display:flex; flex-direction:column; gap:8px; min-height:120px; }
  .row{
    display:flex; align-items:center; gap:12px; background:var(--panel); border:1px solid var(--line);
    border-radius:12px; padding:10px 14px; animation:rise .25s ease both;
  }
  @keyframes rise{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  .row .idx{ font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); width:28px; flex:none; }
  .row .bolt{ width:14px;height:14px;flex:none; color:var(--lilac); }
  .row .time{ font-family:'Space Mono',monospace; font-size:14px; color:var(--text); flex:1; }
  .row .crash{ font-family:'Space Mono',monospace; font-size:14px; font-weight:700; color:var(--periwinkle); }
  .row .answer{ font-family:'Sora',sans-serif; font-size:12px; font-weight:700; letter-spacing:0.5px; padding:4px 10px; border-radius:20px; }
  .row .answer.yes{ background:rgba(231,198,255,0.18); color:var(--lilac); }
  .row .answer.no{ background:rgba(187,208,255,0.10); color:var(--muted); }
  .empty{
    text-align:center; color:var(--muted); font-size:13px; padding:36px 10px;
    border:1px dashed var(--line); border-radius:14px;
  }
  .swipehint{ text-align:center; color:var(--muted); font-size:11px; letter-spacing:1px; margin-top:14px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <svg class="logo" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#E7C6FF"/>
          <stop offset="1" stop-color="#BBD0FF"/>
        </linearGradient>
      </defs>
      <circle cx="50" cy="50" r="47" stroke="url(#g1)" stroke-width="2" opacity="0.5"/>
      <path d="M56 8 L28 52 L46 52 L40 92 L74 44 L54 44 Z" fill="url(#g1)"/>
      <circle cx="30" cy="68" r="3" fill="#E7C6FF"/>
      <circle cx="70" cy="30" r="2" fill="#BBD0FF"/>
    </svg>
    <div class="brand">
      <h1>PDn AvR</h1>
      <p id="brandSub">Session Log</p>
    </div>
  </header>

  <nav class="nav-toggle">
    <button id="tabLog" class="active">Log</button>
    <button id="tabPredict">Predict</button>
  </nav>

  <!-- ===================== LOG VIEW ===================== -->
  <section id="viewLog">
    <div class="pagenav">
      <button id="prevPage" aria-label="Previous page">&#8249;</button>
      <div class="label">
        Page <span id="pageNum">1</span> / 100
        <span class="count" id="pageCount">0 / 20 on this page</span>
      </div>
      <button id="nextPage" aria-label="Next page">&#8250;</button>
    </div>

    <div class="card">
      <div class="field">
        <label for="hh">Time</label>
        <div class="time-row">
          <input id="hh" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="05">
          <span class="colon">:</span>
          <input id="mm" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="45">
          <span class="colon">:</span>
          <input id="ss" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="00">
        </div>
      </div>
      <div class="field">
        <label for="crash">Crashout</label>
        <div class="crash-row">
          <input id="crash" type="text" inputmode="decimal" pattern="[0-9.]*" maxlength="7" placeholder="e.g. 5.45">
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-reset" id="resetBtn">Reset all</button>
        <button class="btn btn-next" id="nextBtn">Next</button>
      </div>
    </div>

    <div class="results-head">
      <h2>Result</h2>
      <span id="totalCount">0 / 2000 logged</span>
    </div>

    <div class="swipe-zone" id="swipeZone">
      <div class="results-list" id="resultsList"></div>
    </div>

    <p class="swipehint">swipe left / right to browse the 100 pages</p>
  </section>

  <!-- ===================== PREDICT VIEW ===================== -->
  <section id="viewPredict" hidden>
    <div class="card">
      <div class="field">
        <label for="phh">Time</label>
        <div class="time-row">
          <input id="phh" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="05">
          <span class="colon">:</span>
          <input id="pmm" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="45">
          <span class="colon">:</span>
          <input id="pss" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="00">
        </div>
      </div>

      <div class="question">next crashout <span>3.00x</span> ?</div>

      <div class="actions">
        <button class="btn btn-no" id="noBtn">No</button>
        <button class="btn btn-yes" id="yesBtn">Yes</button>
      </div>

      <div class="reset-row">
        <button class="btn btn-reset" id="predictResetBtn">Reset results</button>
      </div>
    </div>

    <div class="results-head">
      <h2>Result</h2>
      <span id="predictTotalCount">0 / 20 logged</span>
    </div>

    <div class="results-list" id="predictResultsList"></div>
  </section>

</div>

<script>
  /* ---------- Tab switching ---------- */
  const tabLog = document.getElementById('tabLog');
  const tabPredict = document.getElementById('tabPredict');
  const viewLog = document.getElementById('viewLog');
  const viewPredict = document.getElementById('viewPredict');
  const brandSub = document.getElementById('brandSub');

  function showLog(){
    tabLog.classList.add('active'); tabPredict.classList.remove('active');
    viewLog.hidden = false; viewPredict.hidden = true;
    brandSub.textContent = 'Session Log';
  }
  function showPredict(){
    tabPredict.classList.add('active'); tabLog.classList.remove('active');
    viewPredict.hidden = false; viewLog.hidden = true;
    brandSub.textContent = 'Predict';
  }
  tabLog.addEventListener('click', showLog);
  tabPredict.addEventListener('click', showPredict);

  /* ================= LOG VIEW LOGIC ================= */
  const TOTAL_PAGES = 100;
  const PAGE_CAP = 20;
  const LOG_KEY = 'pdnavr_log_state';
  const pages = Array.from({length: TOTAL_PAGES}, () => []);
  let currentPage = 0;

  function saveLog(){
    try{
      localStorage.setItem(LOG_KEY, JSON.stringify({ pages, currentPage }));
    }catch(e){ /* storage unavailable, ignore */ }
  }
  function loadLog(){
    try{
      const raw = localStorage.getItem(LOG_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (Array.isArray(data.pages)){
        for (let i = 0; i < TOTAL_PAGES; i++){
          pages[i] = Array.isArray(data.pages[i]) ? data.pages[i] : [];
        }
      }
      if (typeof data.currentPage === 'number'){
        currentPage = Math.min(Math.max(data.currentPage, 0), TOTAL_PAGES - 1);
      }
    }catch(e){ /* corrupted or unavailable, start fresh */ }
  }

  const hh = document.getElementById('hh');
  const mm = document.getElementById('mm');
  const ss = document.getElementById('ss');
  const crash = document.getElementById('crash');
  const nextBtn = document.getElementById('nextBtn');
  const resetBtn = document.getElementById('resetBtn');
  const prevPageBtn = document.getElementById('prevPage');
  const nextPageBtn = document.getElementById('nextPage');
  const pageNum = document.getElementById('pageNum');
  const pageCount = document.getElementById('pageCount');
  const totalCount = document.getElementById('totalCount');
  const resultsList = document.getElementById('resultsList');
  const swipeZone = document.getElementById('swipeZone');

  function digitsOnly(el, allowDot){
    el.addEventListener('input', () => {
      let v = el.value;
      v = allowDot ? v.replace(/[^0-9.]/g, '') : v.replace(/[^0-9]/g, '');
      el.value = v;
    });
  }
  digitsOnly(hh); digitsOnly(mm); digitsOnly(ss); digitsOnly(crash, true);
  hh.addEventListener('input', () => { if (hh.value.length >= 2) mm.focus(); });
  mm.addEventListener('input', () => { if (mm.value.length >= 2) ss.focus(); });

  function boltSvg(){
    return '<svg class="bolt" viewBox="0 0 24 24" fill="currentColor"><path d="M13 2 3 14h7l-1 8 11-14h-7l0-6z"/></svg>';
  }
  function pad(v){ return v.length ? v.padStart(2,'0') : '00'; }

  function renderLog(){
    pageNum.textContent = currentPage + 1;
    const p = pages[currentPage];
    pageCount.textContent = p.length + ' / ' + PAGE_CAP + ' on this page';

    const total = pages.reduce((s, arr) => s + arr.length, 0);
    totalCount.textContent = total + ' / ' + (TOTAL_PAGES * PAGE_CAP) + ' logged';

    prevPageBtn.disabled = currentPage === 0;
    nextPageBtn.disabled = currentPage === TOTAL_PAGES - 1;
    nextBtn.disabled = total >= TOTAL_PAGES * PAGE_CAP;

    if (p.length === 0){
      resultsList.innerHTML = '<div class="empty">No entries on this page yet</div>';
      return;
    }
    resultsList.innerHTML = p.map((e, i) => `
      <div class="row">
        <span class="idx">#${String(currentPage*PAGE_CAP + i + 1).padStart(4,'0')}</span>
        ${boltSvg()}
        <span class="time">${e.time}</span>
        <span class="crash">${e.crash}</span>
      </div>
    `).join('');
  }

  nextBtn.addEventListener('click', () => {
    const timeVal = `${pad(hh.value)}:${pad(mm.value)}:${pad(ss.value)}`;
    const crashVal = crash.value.trim();
    if (!crashVal){ crash.focus(); return; }

    let target = currentPage;
    while (target < TOTAL_PAGES && pages[target].length >= PAGE_CAP) target++;
    if (target >= TOTAL_PAGES) { renderLog(); return; }

    pages[target].push({ time: timeVal, crash: crashVal + 'x' });
    currentPage = target;

    hh.value = ''; mm.value = ''; ss.value = ''; crash.value = '';
    hh.focus();
    saveLog();
    renderLog();
  });

  resetBtn.addEventListener('click', () => {
    for (let i = 0; i < TOTAL_PAGES; i++) pages[i] = [];
    currentPage = 0;
    hh.value = ''; mm.value = ''; ss.value = ''; crash.value = '';
    saveLog();
    renderLog();
  });

  prevPageBtn.addEventListener('click', () => { if (currentPage > 0){ currentPage--; saveLog(); renderLog(); } });
  nextPageBtn.addEventListener('click', () => { if (currentPage < TOTAL_PAGES - 1){ currentPage++; saveLog(); renderLog(); } });

  let touchStartX = 0;
  swipeZone.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; }, {passive:true});
  swipeZone.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].screenX - touchStartX;
    if (Math.abs(dx) < 40) return;
    if (dx < 0 && currentPage < TOTAL_PAGES - 1){ currentPage++; saveLog(); renderLog(); }
    if (dx > 0 && currentPage > 0){ currentPage--; saveLog(); renderLog(); }
  }, {passive:true});

  /* ================= PREDICT VIEW LOGIC ================= */
  const PCAP = 20;
  const PREDICT_KEY = 'pdnavr_predict_state';
  const predictEntries = [];

  function savePredict(){
    try{ localStorage.setItem(PREDICT_KEY, JSON.stringify(predictEntries)); }
    catch(e){ /* storage unavailable, ignore */ }
  }
  function loadPredict(){
    try{
      const raw = localStorage.getItem(PREDICT_KEY);
      if (!raw) return;
      const data = JSON.parse(raw);
      if (Array.isArray(data)) predictEntries.push(...data);
    }catch(e){ /* corrupted or unavailable, start fresh */ }
  }

  const phh = document.getElementById('phh');
  const pmm = document.getElementById('pmm');
  const pss = document.getElementById('pss');
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');
  const predictResetBtn = document.getElementById('predictResetBtn');
  const predictResultsList = document.getElementById('predictResultsList');
  const predictTotalCount = document.getElementById('predictTotalCount');

  digitsOnly(phh); digitsOnly(pmm); digitsOnly(pss);
  phh.addEventListener('input', () => { if (phh.value.length >= 2) pmm.focus(); });
  pmm.addEventListener('input', () => { if (pmm.value.length >= 2) pss.focus(); });

  function renderPredict(){
    predictTotalCount.textContent = predictEntries.length + ' / ' + PCAP + ' logged';
    const full = predictEntries.length >= PCAP;
    yesBtn.disabled = full; noBtn.disabled = full;

    if (predictEntries.length === 0){
      predictResultsList.innerHTML = '<div class="empty">No answers logged yet</div>';
      return;
    }
    predictResultsList.innerHTML = predictEntries.map((e, i) => `
      <div class="row">
        <span class="idx">#${String(i + 1).padStart(2,'0')}</span>
        ${boltSvg()}
        <span class="time">${e.time}</span>
        <span class="answer ${e.answer.toLowerCase()}">${e.answer}</span>
      </div>
    `).join('');
  }

  function logAnswer(answer){
    if (predictEntries.length >= PCAP) return;
    const timeVal = `${pad(phh.value)}:${pad(pmm.value)}:${pad(pss.value)}`;
    predictEntries.push({ time: timeVal, answer });
    phh.value = ''; pmm.value = ''; pss.value = '';
    phh.focus();
    savePredict();
    renderPredict();
  }
  yesBtn.addEventListener('click', () => logAnswer('Yes'));
  noBtn.addEventListener('click', () => logAnswer('No'));

  predictResetBtn.addEventListener('click', () => {
    predictEntries.length = 0;
    phh.value = ''; pmm.value = ''; pss.value = '';
    savePredict();
    renderPredict();
  });

  loadLog();
  loadPredict();
  renderLog();
  renderPredict();
</script>
</body>
</html>
